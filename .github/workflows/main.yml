name: Verify-and-Build
on: [push, workflow_dispatch]

env:
  TEX_FILE: main.tex  # Your .tex is in root

jobs:
  verify:
    name: Verify Battle Plan v1.6
    runs-on: ubuntu-latest
    container: sagemath/sagemath:latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Battle Plan v1.6
        run: sage bin/verify_battleplan_v1.6.sage
  
  build-pdf:
    name: Build PDF
    needs: verify
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build PDF
        run: latexmk -pdf -interaction=nonstopmode ${{ env.TEX_FILE }}
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bdp-self-symmetry-v1.6-verified
          path: main.pdf
          retention-days: 90
